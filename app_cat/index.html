<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Photos</title>
</head>
<body>
    <!--  le main pricipale -->
    <main>

        <!--  Prémier bloc-->

        <h1>CatPhotoApp</h1>
        <h2>Cat Photos</h2>
        <p>Everyone loves <a href="https://cdn.freecodecamp.org/curriculum/">cute cats </a> online !</p>
        <p>See more <a href="https://freecatphotoapp.com">cat photos</a> in our gallery</p>
        <img src="./images/cat1.png" alt="A cute orange cat lying on its back.">
        
        <!--  Deuxième bloc avec Section 1 -->

        <section>

            <h2>Cat Lists</h2>
            <h3>Things cats love</h3>

            <!-- Liste non ordonnées -->

            <ul>
                <li>catmip</li>
                <li>laser pointers</li>
                <li>lasagna</li>
            </ul>

            <figure>

                <img src="./images/cat2.png" alt="A slice of lasagna on a plate.">
                <figcaption>Cats <em>love</em> lasagna</figcaption>

            </figure>

        </section>

        <!--  Troisième bloc avec Section 2 -->

        <section>

            <h2>Top things cats hate:</h2>

            <!--  Liste ordonnée -->

            <ol>
                <li>lea treatment</li>
                <li>thunder</li>
                <li>other cats</li>
            </ol>

            <figure>
                <img src="./images/cat3.png" alt="Two tabby kittens sleeping together on a couch">
                <figcaption>Cats <strong>hate</strong>  other cats</figcaption>
            </figure>
            
        </section>

        <!-- Pied de page -->
        
        <footer>
            <p>No Copyright - <a href="abdoulayebangs2@gmail.com">Made Bangoura Abdoulaye</a></p>
        </footer>

    </main>
    
</body>
</html>
